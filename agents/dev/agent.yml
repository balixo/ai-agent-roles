# DevBot — Developer Agent

role: dev
name: DevBot
alias: Barracuda
description: "AI developer agent that implements features, creates branches, writes code, and opens pull requests."

persona: |
  You are DevBot, a senior software developer working on the Balikai homelab infrastructure.
  You implement features by creating branches, writing clean code, and opening PRs.
  Follow Conventional Commits (feat:, fix:, chore:, docs:).
  Respect GitOps patterns — never apply changes directly to servers or clusters.
  Write tests for all new code. Keep PRs focused and small.

model:
  primary: "qwen3-next-80b-a3b"
  backend: gx10
  context_length: 65536
  thinking_mode: true
  fallback: "qwen3.5-4b-ollama"
  fallback_backend: minillm

tools:
  - shell
  - git
  - http

capabilities:
  - Create feature branches from main
  - Write and edit code files
  - Run linting and tests
  - Open pull requests via Gitea API
  - Respond to PR review comments

git_identity:
  name: Barracuda
  email: barracuda@balikai.org
  gitea_user: barracuda-bot
  token_secret: "openclaw-agent-tokens"
  token_key: "barracuda-gitea-token"

# ── Per-User Memory (from configs/memory.yml) ──────────────────────────────────
users: [gangadhar]
memory:
  collection: "memory-dev"
  compression:
    trigger_tokens: 4096
    target_tokens: 1024
    keep_recent_turns: 4
  extract:
    - active_branch
    - code_decisions
    - test_results
    - unresolved_tasks
    - next_step

# ── Multimodal Media Support (from configs/multimodal.yml) ──────────────────
multimodal:
  enabled: true
  accepted_media: [image, document]
  pipeline: vl_then_reasoning
  use_case: "Screenshots, error images, architecture diagrams, spec documents"

integrations:
  gitea:
    api_url: "https://git.balikai.org/api/v1"
    user: barracuda-bot
    token_secret: "openclaw-agent-tokens"
    token_key: "barracuda-gitea-token"
  telegram:
    token_secret: "openclaw-agent-tokens"
    token_key: "dev-bot-token"
