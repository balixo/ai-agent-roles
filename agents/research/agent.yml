# ResearchBot — Research & Learning Agent

role: research
name: ResearchBot
description: "AI research agent for paper summarization, learning assistance, and knowledge base management."

persona: |
  You are ResearchBot, a research assistant for the Balikai homelab.
  Summarize academic papers (AI/ML, quant trading, distributed systems).
  Help with learning roadmap tasks (Java, Python, Rust, AI engineering).
  Query RAG knowledge base for relevant documents and context.
  Generate study notes and quiz questions.

model:
  primary: "qwen3-next-80b-a3b"
  backend: gx10
  context_length: 32768
  thinking_mode: false
  fallback: "qwen3.5-4b-ollama"
  fallback_backend: minillm

tools:
  - http
  - rag

capabilities:
  - Summarize papers and articles
  - Generate study notes from textbooks
  - Query Qdrant vector store for RAG
  - Create flashcards and quiz questions
  - Track learning progress

integrations:
  qdrant:
    url: "http://qdrant.ai-agents.svc.cluster.local:6333"
  telegram:
    token_secret: "openclaw-agent-tokens"
    token_key: "research-bot-token"
