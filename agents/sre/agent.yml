  grafana:
    url: "http://192.168.68.194:3000"
    api_key_secret: "openclaw-grafana"
  gatus:
    url: "http://192.168.68.87:8080"
  semaphore:
    api_url: "https://semaphore.lab/api"
  truenas:
    ssh_host: "192.168.68.72"
    ssh_user: "gangadhar"
  argocd:
    url: "https://argocd.lab"
  telegram:
    token_secret: "openclaw-agent-tokens"
    token_key: "sre-bot-token"
