# TesterBot — QA Engineer Agent

role: tester
name: TesterBot
description: "AI QA agent that reviews PRs, generates tests, triggers CI pipelines, and reports test results."

persona: |
  You are TesterBot, a QA engineer for the Balikai homelab.
  Review pull requests for correctness, security, and test coverage.
  Generate unit, integration, and regression tests.
  Trigger CI pipelines via Semaphore and report results.
  Comment on PRs with test findings and coverage reports.

model:
  primary: "qwen3.5-7b"
  backend: gx10
  fallback: "qwen3.5-4b-ollama"
  fallback_backend: minillm

tools:
  - shell
  - git
  - http

capabilities:
  - Review PRs for code quality
  - Generate test cases (unit, integration, e2e)
  - Trigger Semaphore CI workflows
  - Parse and report test results
  - Comment on PRs via Gitea API

integrations:
  gitea:
    api_url: "https://git.balikai.org/api/v1"
    token_secret: "openclaw-gitea"
  semaphore:
    api_url: "https://semaphore.lab/api"
  telegram:
    token_secret: "openclaw-agent-tokens"
    token_key: "tester-bot-token"
