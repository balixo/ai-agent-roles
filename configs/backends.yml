# Inference Backend Configuration
# Central registry of all LLM inference endpoints

backends:
  gx10:
    name: "GX10 (Primary - vLLM)"
    url: "http://192.168.68.92:8000/v1"
    engine: vllm
    health_endpoint: "/v1/models"
    models:
      - id: "nvidia/Qwen3-Next-80B-A3B-Instruct-NVFP4"
        alias: "qwen3-next-80b-a3b"
        purpose: "Primary inference — all heavy tasks (coding, architecture, math/science tutoring)"
        max_tokens: 65536
        supports_thinking: true
        quantization: "NVFP4"
        architecture: "MoE 80B (512 experts top-10, 3B active/token, hybrid Mamba+Attention)"
        speed: "~42 tok/s (Marlin), ~67 tok/s (MTP)"

  desktop:
    name: "Desktop (Local - Ollama)"
    url: "http://localhost:11434/v1"
    engine: ollama
    health_endpoint: "/api/tags"
    models:
      - id: "sorc/qwen3.5-claude-4.6-opus-q4:9b"
        alias: "qwen3.5-9b-desktop"
        purpose: "Local interactive chat (low-latency, always-on)"
        max_tokens: 32768

  minillm:
    name: "minillm (Secondary - Ollama)"
    url: "http://192.168.68.57:11434/v1"
    engine: ollama
    health_endpoint: "/api/tags"
    models:
      - id: "qwen3-vl:4b-instruct"
        alias: "qwen3-vl-4b"
        purpose: "Vision LLM (image captioning, OCR, document/chart extraction)"
        max_tokens: 4096
      - id: "whisper:base"
        alias: "whisper-base"
        purpose: "Speech-to-text (audio transcription for multimodal pipeline)"
        max_tokens: 4096

  jetson:
    name: "Jetson (Embeddings - Ollama)"
    url: "http://192.168.68.81:11434/v1"
    engine: ollama
    health_endpoint: "/api/tags"
    models:
      - id: "snowflake-arctic-embed2:latest"
        alias: "arctic-embed"
        purpose: "Embedding (1024-dim vectors)"
        embedding: true
