# Agent-to-Model Routing Rules
# Determines which model serves each agent based on task complexity
#
# ── Router Logic ────────────────────────────────────────────────────────────
# The router inspects the agent role and routes to the appropriate backend/model.
# vLLM handles request queuing natively — concurrent requests to the same model
# share weights in memory (PagedAttention). No external load balancer needed.
#
# ── Load Balancing Strategy ─────────────────────────────────────────────────
# 1. vLLM internal: PagedAttention multiplexes concurrent requests for 80B MoE
# 2. Single model: Qwen3-Next-80B-A3B-NVFP4 uses 128 GB unified memory (65K ctx)
# 3. Overflow: If GX10 queue > threshold, route to minillm (4B)
# 4. Desktop Ollama is Gangadhar's PERSONAL interactive session ONLY — never
#    used by autonomous agents as primary or fallback.
#
# ── Thinking Mode ──────────────────────────────────────────────────────────
# Models with thinking_mode=true use /think prefix and enable_thinking=True.
# Recommended for: math proofs, physics derivations, architecture decisions,
#   code review, complex debugging
# Not recommended for: simple Q&A, classification, ops commands, casual chat

routing:
  default_backend: gx10
  default_model: "qwen3-next-80b-a3b"

  # ── Coding Agents ───────────────────────────────────────────────────────
  agents:
    dev:
      backend: gx10
      model: "qwen3-next-80b-a3b"
      context_length: 65536
      thinking_mode: true
      fallback_backend: minillm
      fallback_model: "qwen3.5-4b-ollama"
      reason: "Feature implementation needs strong reasoning + full project context"

    jr-dev:
      backend: minillm
      model: "qwen3.5-4b-ollama"
      context_length: 4096
      thinking_mode: false
      fallback_backend: gx10
      fallback_model: "qwen3-next-80b-a3b"
      reason: "Simple bugs, docs, routine tasks — speed over depth"

    sr-dev:
      backend: gx10
      model: "qwen3-next-80b-a3b"
      context_length: 65536
      thinking_mode: true
      fallback_backend: minillm
      fallback_model: "qwen3.5-4b-ollama"
      reason: "Code review and architecture guidance require depth + full codebase"

    sre:
      backend: minillm
      model: "qwen3.5-4b-ollama"
      context_length: 4096
      thinking_mode: false
      fallback_backend: gx10
      fallback_model: "qwen3-next-80b-a3b"
      reason: "Diagnostics/monitoring need speed; escalate to 80B for complex diagnosis"

    tester:
      backend: minillm
      model: "qwen3.5-4b-ollama"
      context_length: 4096
      thinking_mode: false
      fallback_backend: gx10
      fallback_model: "qwen3-next-80b-a3b"
      reason: "Test generation is formulaic, 4B is sufficient; fallback 80B for complex e2e"

    # ── Education Agents (from ai-tutor-prompts) ──────────────────────────
    math-teacher:
      backend: gx10
      model: "qwen3-next-80b-a3b"
      context_length: 32768
      thinking_mode: true
      temperature: 0.6
      top_p: 0.95
      fallback_backend: minillm
      fallback_model: "qwen3.5-4b-ollama"
      reason: "AMC/AP Calc requires deep mathematical reasoning with step-by-step proofs"

    science-teacher:
      backend: gx10
      model: "qwen3-next-80b-a3b"
      context_length: 32768
      thinking_mode: true
      temperature: 0.6
      top_p: 0.95
      fallback_backend: minillm
      fallback_model: "qwen3.5-4b-ollama"
      reason: "Physics/chemistry derivations need calculus-level reasoning"

    english-teacher:
      backend: gx10
      model: "qwen3-next-80b-a3b"
      context_length: 32768
      thinking_mode: false
      temperature: 0.7
      top_p: 0.8
      fallback_backend: minillm
      fallback_model: "qwen3.5-4b-ollama"
      reason: "Writing feedback benefits from 80B quality; no thinking mode needed"

    chinese-teacher:
      backend: gx10
      model: "qwen3-next-80b-a3b"
      context_length: 32768
      thinking_mode: false
      temperature: 0.7
      top_p: 0.8
      fallback_backend: minillm
      fallback_model: "qwen3.5-4b-ollama"
      reason: "Qwen-family is natively strong in Chinese; 80B for best quality"

    history-teacher:
      backend: gx10
      model: "qwen3-next-80b-a3b"
      context_length: 32768
      thinking_mode: false
      temperature: 0.7
      top_p: 0.8
      fallback_backend: minillm
      fallback_model: "qwen3.5-4b-ollama"
      reason: "Factual recall + essay analysis on 80B; fallback 4B for simple Q&A"

    # ── Family Agent ──────────────────────────────────────────────────────
    family:
      backend: minillm
      model: "qwen3.5-4b-ollama"
      context_length: 4096
      thinking_mode: false
      temperature: 0.7
      top_p: 0.8
      fallback_backend: gx10
      fallback_model: "qwen3-next-80b-a3b"
      reason: "Always-on low-latency family chat; escalate to 80B for complex questions"

    # ── Infrastructure Agents ─────────────────────────────────────────────
    ops:
      backend: minillm
      model: "qwen3.5-4b-ollama"
      context_length: 4096
      thinking_mode: false
      fallback_backend: gx10
      fallback_model: "qwen3-next-80b-a3b"
      reason: "Simple operational commands, health checks"

    research:
      backend: gx10
      model: "qwen3-next-80b-a3b"
      context_length: 32768
      thinking_mode: false
      fallback_backend: minillm
      fallback_model: "qwen3.5-4b-ollama"
      reason: "Paper summarization and learning Q&A benefit from 80B depth"

    # ── Learning Coach ────────────────────────────────────────────────────
    learning-coach:
      backend: gx10
      model: "qwen3-next-80b-a3b"
      context_length: 65536
      thinking_mode: true
      fallback_backend: minillm
      fallback_model: "qwen3.5-4b-ollama"
      reason: "Multi-user learning coach needs deep reasoning + full RAG context"
      per_user_override:
        sameena: { model: "qwen3-next-80b-a3b", thinking_mode: false, context_length: 32768 }
        rishaan: { model: "qwen3-next-80b-a3b", thinking_mode: false, context_length: 32768 }

  # ── Embedding always routes to Jetson ─────────────────────────────────
  embedding:
    backend: jetson
    model: "arctic-embed"

  # ── Vision always routes to minillm ───────────────────────────────────
  vision:
    backend: minillm
    model: "qwen3-vl-4b"
