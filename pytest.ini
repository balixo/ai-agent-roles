[pytest]
testpaths = tests/unit tests/integration tests/e2e
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Unit tests for agent validation and config parsing
    integration: Tests requiring backend connectivity
    e2e: End-to-end agent workflow tests
    slow: Tests that take longer than 10 seconds

log_cli = true
log_cli_level = INFO
